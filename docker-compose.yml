# ─────────────────────────────────────────────────────────
# Zero Sum Times — Local Docker Compose
# ─────────────────────────────────────────────────────────
# Quick start:
#   cp backend/.env.example backend/.env   # create config
#   docker compose up --build              # build & run
#
# Then open http://localhost:3000
# ─────────────────────────────────────────────────────────

services:
  backend:
    build: ./backend
    container_name: zero-sum-backend
    ports:
      - "5000:5000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - CACHE_TTL_SECONDS=14400
    volumes:
      - ./data/cache:/app/cache
      - ./data/static_analysis:/app/static_analysis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  scheduler:
    build: ./backend
    container_name: zero-sum-scheduler
    command: ["python", "scheduler.py"]
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - TIER1_MARKET_OPEN_SEC=300
      - TIER1_MARKET_CLOSED_SEC=1800
      - TIER2_INTERVAL_SEC=14400
      - BATCH_DELAY=0.8
      - BATCH_WORKERS=3
      - BATCH_TTL_HOURS=20
    volumes:
      - ./data/cache:/app/cache
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:5000
    container_name: zero-sum-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# Data is bind-mounted to ./data/ on the host for persistence.
# Back up ./data/ to preserve cache across re-deploys.
